user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # Teruskan /api/ dan /sanctum/ ke Laravel (PHP-FPM)
        location ~ ^/(api|sanctum) {
            root /var/www/backend/public;
            try_files $uri /index.php$is_args$args;
        }

        # File upload/storage dari Laravel
        location /storage/ {
            alias /var/www/storage/;
            try_files $uri =404;
        }

        # Semua request lain diteruskan ke React frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Eksekusi PHP (Untuk menangani internal redirect try_files ke index.php)
        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        }
    }
}